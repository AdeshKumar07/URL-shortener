<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URL Shortener</title>
    <!-- Tailwind CSS play CDN — suitable for demo/dev builds -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink:      "#15171a",
              mist:     "#f4f7fb",
              leaf:     "#1f8a70",
              coral:    "#f46b5b",
              skyglass: "#dff3ff"
            },
            boxShadow: {
              panel: "0 18px 60px rgba(21, 23, 26, 0.12)"
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-mist text-ink antialiased">
    <main class="min-h-screen">

      <!-- ── Header / Nav ──────────────────────────────────────── -->
      <section class="border-b border-ink/10 bg-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
          <a href="/" class="flex items-center gap-3" aria-label="URL Shortener home">
            <span class="grid h-10 w-10 place-items-center rounded-lg bg-leaf text-white shadow-sm">
              <i data-lucide="link-2" class="h-5 w-5"></i>
            </span>
            <span>
              <span class="block text-base font-bold">URL Shortener</span>
              <span class="block text-xs font-medium text-ink/55">Spring Boot + Docker</span>
            </span>
          </a>

          <!-- Live health-check badge -->
          <div class="flex items-center gap-2 text-sm font-medium text-ink/65">
            <span id="healthDot" class="h-2.5 w-2.5 rounded-full bg-slate-300"></span>
            <span id="healthText">Checking…</span>
          </div>
        </div>
      </section>

      <!-- ── Main content grid ─────────────────────────────────── -->
      <section class="mx-auto grid max-w-6xl gap-8 px-5 py-8 lg:grid-cols-[minmax(0,1fr)_360px] lg:py-12">

        <!-- Shorten form card -->
        <div class="rounded-lg bg-white p-5 shadow-panel ring-1 ring-ink/5 sm:p-7">
          <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <h1 class="text-3xl font-black tracking-normal text-ink sm:text-4xl">Shorten a URL</h1>
              <p class="mt-2 max-w-2xl text-sm leading-6 text-ink/65">
                Paste a long link and get a clean short URL backed by the Spring Boot API.
              </p>
            </div>
            <span class="inline-flex w-fit items-center gap-2 rounded-md bg-skyglass px-3 py-2 text-sm font-semibold text-ink">
              <i data-lucide="server" class="h-4 w-4"></i>
              Deployment ready
            </span>
          </div>

          <form id="shortenForm" class="space-y-4">
            <label for="urlInput" class="block text-sm font-semibold text-ink">Long URL</label>
            <div class="flex flex-col gap-3 sm:flex-row">
              <input
                id="urlInput"
                name="url"
                type="text"
                inputmode="url"
                required
                placeholder="https://example.com/articles/a-very-long-link"
                class="min-h-12 flex-1 rounded-md border border-ink/15 bg-white px-4 text-base outline-none transition focus:border-leaf focus:ring-4 focus:ring-leaf/15"
              />
              <button
                id="submitButton"
                type="submit"
                class="inline-flex min-h-12 items-center justify-center gap-2 rounded-md bg-leaf px-5 text-base font-bold text-white transition hover:bg-leaf/90 focus:outline-none focus:ring-4 focus:ring-leaf/25 disabled:cursor-not-allowed disabled:opacity-60"
              >
                <i data-lucide="wand-2" class="h-5 w-5"></i>
                Shorten
              </button>
            </div>
            <!-- Status / error message -->
            <p id="formMessage" class="min-h-6 text-sm font-medium text-ink/60" role="status" aria-live="polite"></p>
          </form>

          <!-- Result panel (hidden until first successful shorten) -->
          <div id="resultPanel" class="mt-6 hidden rounded-lg border border-leaf/20 bg-leaf/5 p-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div class="min-w-0">
                <p class="text-xs font-bold uppercase tracking-wider text-leaf">Short link</p>
                <a
                  id="shortLink"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="mt-1 block break-all text-lg font-black text-ink hover:text-leaf"
                ></a>
              </div>
              <button
                id="copyButton"
                type="button"
                class="inline-flex min-h-10 items-center justify-center gap-2 rounded-md border border-ink/15 bg-white px-4 text-sm font-bold text-ink transition hover:border-leaf hover:text-leaf focus:outline-none focus:ring-4 focus:ring-leaf/15"
              >
                <i data-lucide="copy" class="h-4 w-4"></i>
                Copy
              </button>
            </div>
            <p id="originalUrl" class="mt-3 break-all text-sm text-ink/60"></p>
          </div>
        </div>

        <!-- Recent links sidebar -->
        <aside class="rounded-lg bg-ink p-5 text-white shadow-panel">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-black">Recent links</h2>
            <button
              id="clearHistory"
              type="button"
              class="rounded-md p-2 text-white/70 transition hover:bg-white/10 hover:text-white"
              aria-label="Clear recent links"
            >
              <i data-lucide="trash-2" class="h-4 w-4"></i>
            </button>
          </div>
          <div id="historyList" class="mt-4 space-y-3"></div>
          <div class="mt-6 grid grid-cols-3 gap-3 border-t border-white/10 pt-5 text-center">
            <div>
              <p id="linkCount" class="text-2xl font-black">0</p>
              <p class="text-xs text-white/55">Saved</p>
            </div>
            <div>
              <p class="text-2xl font-black">302</p>
              <p class="text-xs text-white/55">Redirect</p>
            </div>
            <div>
              <p class="text-2xl font-black">H2</p>
              <p class="text-xs text-white/55">Storage</p>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <!-- FIX: Pin lucide to a specific version instead of @latest to prevent
         unexpected breaking changes from upstream releases. -->
    <script src="https://unpkg.com/lucide@0.441.0/dist/umd/lucide.min.js"></script>

    <script>
      // ── DOM references ──────────────────────────────────────────
      const form         = document.querySelector("#shortenForm");
      const input        = document.querySelector("#urlInput");
      const submitButton = document.querySelector("#submitButton");
      const message      = document.querySelector("#formMessage");
      const resultPanel  = document.querySelector("#resultPanel");
      const shortLink    = document.querySelector("#shortLink");
      const originalUrl  = document.querySelector("#originalUrl");
      const copyButton   = document.querySelector("#copyButton");
      const historyList  = document.querySelector("#historyList");
      const clearHistory = document.querySelector("#clearHistory");
      const linkCount    = document.querySelector("#linkCount");
      const healthDot    = document.querySelector("#healthDot");
      const healthText   = document.querySelector("#healthText");
      const HISTORY_KEY  = "url-shortener-history";

      // ── API base selection ─────────────────────────────────────
      // When the UI is served by Spring Boot (recommended), same-origin
      // requests work: /shorten, /health.
      // When the UI is opened via VS Code Live Server (often :5500), those
      // relative URLs hit Live Server instead of Spring Boot. In that case,
      // fall back to http://localhost:8080.
      const API_BASE_CANDIDATES = (() => {
        const isSpringOrigin = window.location.port === "8080";
        if (isSpringOrigin) return [""];
        return ["", "http://localhost:8080"]; // try same-origin, then local backend
      })();

      async function apiFetch(path, options) {
        let lastError;
        for (const base of API_BASE_CANDIDATES) {
          try {
            const response = await fetch(base + path, options);

            // Heuristic: if we're not on :8080 and same-origin returns an HTML/plain
            // 404/405, it's very likely Live Server — retry against the backend.
            const contentType = (response.headers.get("content-type") || "").toLowerCase();
            const looksLikeLiveServerMismatch =
              base === "" && window.location.port !== "8080" &&
              (response.status === 404 || response.status === 405) &&
              (contentType.includes("text/html") || contentType.includes("text/plain") || contentType === "");

            if (looksLikeLiveServerMismatch && API_BASE_CANDIDATES.length > 1) {
              continue;
            }

            return response;
          } catch (err) {
            lastError = err;
          }
        }

        throw lastError || new Error("Network error");
      }

      async function readJsonOrText(response) {
        const contentType = (response.headers.get("content-type") || "").toLowerCase();
        if (contentType.includes("application/json")) {
          try {
            return await response.json();
          } catch {
            return { error: "Server returned invalid/empty JSON" };
          }
        }

        const text = await response.text();
        return { error: text || "Server returned an empty response" };
      }

      // ── Local-storage helpers ───────────────────────────────────
      const loadHistory = () => {
        try {
          return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        } catch {
          return [];
        }
      };
      const saveHistory = (items) => {
        try {
          localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 6)));
        } catch { /* storage quota exceeded — ignore */ }
      };

      // ── Render recent-links sidebar ─────────────────────────────
      function renderHistory() {
        const items = loadHistory();
        linkCount.textContent = items.length;
        historyList.innerHTML = "";

        if (items.length === 0) {
          historyList.innerHTML =
            '<p class="rounded-md border border-white/10 bg-white/5 p-3 text-sm text-white/60">No links yet.</p>';
          return;
        }

        items.forEach((item) => {
          const row       = document.createElement("a");
          row.href        = item.short;
          row.target      = "_blank";
          row.rel         = "noopener noreferrer";
          row.className   = "block rounded-md border border-white/10 bg-white/5 p-3 transition hover:bg-white/10";
          // textContent is used for user-supplied data to prevent XSS
          const shortSpan    = document.createElement("span");
          shortSpan.className = "block truncate text-sm font-bold text-white";
          shortSpan.textContent = item.short;

          const originalSpan    = document.createElement("span");
          originalSpan.className = "mt-1 block truncate text-xs text-white/55";
          originalSpan.textContent = item.original;

          row.appendChild(shortSpan);
          row.appendChild(originalSpan);
          historyList.appendChild(row);
        });
      }

      // ── Status message helper ───────────────────────────────────
      function setMessage(text, type = "muted") {
        message.textContent = text;
        message.className =
          "min-h-6 text-sm font-medium " +
          (type === "error" ? "text-coral" : "text-ink/60");
      }

      // ── Copy short link to clipboard ────────────────────────────
      // FIX: navigator.clipboard is only available in secure contexts
      // (HTTPS or localhost). Added a textarea-based fallback so the
      // Copy button works when the app is accessed over plain HTTP.
      async function copyShortLink() {
        const url = shortLink.href;
        let success = false;

        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(url);
            success = true;
          } catch { /* fall through to legacy method */ }
        }

        if (!success) {
          // Legacy execCommand fallback for HTTP environments
          const ta = document.createElement("textarea");
          ta.value = url;
          ta.style.position = "fixed";
          ta.style.opacity  = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try {
            document.execCommand("copy");
            success = true;
          } catch { /* nothing we can do */ }
          document.body.removeChild(ta);
        }

        if (success) {
          copyButton.innerHTML = '<i data-lucide="check" class="h-4 w-4"></i> Copied!';
          lucide.createIcons();
          setTimeout(() => {
            copyButton.innerHTML = '<i data-lucide="copy" class="h-4 w-4"></i> Copy';
            lucide.createIcons();
          }, 1800);
        } else {
          copyButton.textContent = "Select & copy manually";
          setTimeout(() => {
            copyButton.innerHTML = '<i data-lucide="copy" class="h-4 w-4"></i> Copy';
            lucide.createIcons();
          }, 2500);
        }
      }

      // ── Shorten form submit ─────────────────────────────────────
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setMessage("Creating short link…");

        try {
          let longUrl = input.value.trim();
          if (!longUrl) {
            throw new Error("Please paste a URL first.");
          }

          // If the user pastes "example.com" or "www.example.com", helpfully
          // add https:// so the backend validation (http/https only) passes.
          if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(longUrl)) {
            if (longUrl.startsWith("//")) {
              longUrl = "https:" + longUrl;
            } else {
              longUrl = "https://" + longUrl;
            }
          }

          // Quick client-side sanity check for clearer UX.
          try {
            // eslint-disable-next-line no-new
            new URL(longUrl);
          } catch {
            throw new Error("Please enter a valid URL.");
          }

          const response = await apiFetch("/shorten", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ url: longUrl })
          });

          const data = await readJsonOrText(response);

          if (!response.ok) {
            throw new Error(data.error || "Could not shorten this URL.");
          }

          // Populate result panel
          shortLink.href        = data.short;
          shortLink.textContent = data.short;
          originalUrl.textContent = "→ " + data.original;
          resultPanel.classList.remove("hidden");
          setMessage("Short link is ready!");

          // FIX: Clear input after a successful shorten so the user
          // can immediately paste the next URL without manual clearing.
          input.value = "";

          // Persist to sidebar history (deduplicated by short URL)
          const nextHistory = [
            { short: data.short, original: data.original },
            ...loadHistory().filter((item) => item.short !== data.short)
          ];
          saveHistory(nextHistory);
          renderHistory();

        } catch (error) {
          setMessage(error.message, "error");
        } finally {
          submitButton.disabled = false;
        }
      });

      // ── Sidebar controls ────────────────────────────────────────
      copyButton.addEventListener("click", copyShortLink);

      clearHistory.addEventListener("click", () => {
        saveHistory([]);
        renderHistory();
      });

      // ── Health check ────────────────────────────────────────────
      async function checkHealth() {
        try {
          const response = await apiFetch("/health");
          if (!response.ok) throw new Error("not ok");
          const data = await readJsonOrText(response);
          if (data.status !== "UP") throw new Error("status not UP");
          healthDot.className  = "h-2.5 w-2.5 rounded-full bg-leaf";
          healthText.textContent = "Online";
        } catch {
          healthDot.className  = "h-2.5 w-2.5 rounded-full bg-coral";
          healthText.textContent = "Offline";
        }
      }

      // ── Init ────────────────────────────────────────────────────
      renderHistory();
      checkHealth();
      lucide.createIcons();

      // Re-check health every 30 s so the badge stays current
      setInterval(checkHealth, 30_000);
    </script>
  </body>
</html>
