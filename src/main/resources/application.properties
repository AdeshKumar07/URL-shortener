# ── Server ────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── H2 Database ───────────────────────────────────────────────────
# Default: in-memory (dev/test). Docker Compose overrides to file-based
# for persistent storage across container restarts.
#
# FIX: Added AUTO_RECONNECT=TRUE to the default in-memory URL so the
# connection pool can recover without needing a restart on transient errors.
# NON_KEYWORDS=VALUE prevents H2 2.x from treating VALUE as a reserved word,
# which causes Hibernate schema generation to fail silently on some versions.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:urldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
# FIX: open-in-view=false prevents the "Open Session in View" anti-pattern
# from holding DB connections open for the full HTTP request lifecycle.
spring.jpa.open-in-view=false

# ── H2 Web Console ────────────────────────────────────────────────
# Disabled in production; enable for local debugging only.
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.devops=INFO
# FIX: Suppress Hibernate SQL logging in production to avoid leaking
# query details; override with SPRING_JPA_SHOW_SQL=true for debugging.
logging.level.org.hibernate.SQL=WARN
