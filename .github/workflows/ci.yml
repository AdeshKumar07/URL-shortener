name: CI Pipeline

# ── Triggers ──────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── Jobs ──────────────────────────────────────────────────────────
jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 with Maven dependency cache
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Build and run tests with Maven
      - name: Build and Test with Maven
        run: mvn clean package

      # Step 4: Upload test results (visible in Actions tab)
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # FIX: Set up Docker Buildx before any docker/build-push-action calls.
      # Without this step, multi-platform builds and layer caching don't work,
      # which can cause the build to silently fall back to a legacy builder
      # or fail entirely on self-hosted runners.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX: Build the Docker image ONCE and push to BOTH registries in a
      # single step. The original workflow called build-push-action twice,
      # which built the image from scratch twice — doubling CI build time
      # and consuming twice the runner minutes / bandwidth.
      # Layer caching via GitHub Actions cache is enabled for faster rebuilds.
      - name: Build and Push to Docker Hub + GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/url-shortener:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
